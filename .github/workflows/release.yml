name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history so auto-generated notes can diff against the prior tag.
          fetch-depth: 0

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        # Draft so the notes can be reviewed before publishing. go-wav is a
        # pure library with no binary artifacts, so there is nothing to attach.
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
